# Local stack: PostgreSQL + the Atria API. Run with `docker compose up --build`.
# The API applies EF migrations on startup (Database__MigrateOnStartup=true) so the
# schema is ready automatically. Dev secrets come from appsettings.json defaults —
# override them with real values via environment / a secret store for anything real.

services:
  db:
    image: postgres:16-alpine
    container_name: atria-db
    environment:
      POSTGRES_USER: atria
      # Required: set via GitHub Actions secret on deploy, or the project .env locally.
      # NOTE: POSTGRES_PASSWORD only takes effect when the data volume is FIRST initialized.
      # The existing prod volume was created with "atria", so this secret MUST equal the
      # current password unless you intentionally reset the atria-pgdata volume.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: atria
    # Postgres is published on the host's 5432. NOTE: this binds 0.0.0.0, exposing the DB
    # to the public internet on the server — restrict it with a firewall / security group and
    # keep a strong POSTGRES_PASSWORD. For host-only access use "127.0.0.1:5432:5432" instead.
    ports:
      - "5432:5432"
    volumes:
      - atria-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atria -d atria"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atria-api
    depends_on:
      db:
        condition: service_healthy
    # Real secrets (Didit, JWT, Encryption, real DB password, etc.) come from an OPTIONAL
    # .env file placed next to this compose on the server (gitignored, never committed).
    # Use double-underscore keys, e.g. Didit__ApiKey, Didit__WebhookSecret, Didit__WorkflowId.
    # If .env is absent the app falls back to appsettings defaults (so the stack still boots).
    env_file:
      - path: .env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # Point the app at the db service (overrides the appsettings default). The password
      # is interpolated from the same POSTGRES_PASSWORD variable used by the db service.
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=atria;Username=atria;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      # Auto-apply migrations on startup so the stack is usable immediately.
      Database__MigrateOnStartup: "true"
      # Seed demo tokenization objects (Properties) on first run (idempotent).
      Database__SeedOnStartup: "true"
      # Nikita Pro SMS gateway credentials, mapped from the NIKITA_PRO_* variables. On deploy
      # those come from GitHub Actions secrets exported into the SSH session (see deploy.yml);
      # for a local `docker compose up` they come from the project .env (compose interpolates
      # ${...} from the shell env or .env). `environment:` overrides any stale server-side .env,
      # and the :? guard FAILS the deploy with a clear message if a variable is unset/empty,
      # so a misconfigured secret can never boot the app with blank credentials.
      NikitaPro__Login: ${NIKITA_PRO_LOGIN:?NIKITA_PRO_LOGIN is required}
      NikitaPro__ApiKey: ${NIKITA_PRO_API_KEY:?NIKITA_PRO_API_KEY is required}
      # Sender is not secret; pin it explicitly so it can't drift from the approved name.
      NikitaPro__Sender: MYDATACOIN
      # !!! TEMPORARY SMS-OUTAGE BYPASS — REMOVE THIS LINE once the SMS provider is restored !!!
      # Lets verify-otp accept code 111111 for any phone without SMS. This is an auth bypass.
      Otp__MagicCode: "111111"
      # Static admin login (POST /auth/admin/login). DISABLED unless Admin__Password is set.
      # Supply via the project .env (local) or GitHub Actions secrets (deploy). Admin__UserId
      # MUST equal the Id of the seeded Admin users row so the token maps to a real account.
      Admin__Username: ${ADMIN_USERNAME:-}
      Admin__Password: ${ADMIN_PASSWORD:-}
      Admin__UserId: ${ADMIN_USER_ID:-00000000-0000-0000-0000-000000000000}
      # Didit hosted-KYC secrets, mapped from the DIDIT_* variables (same flow as NIKITA_PRO_*:
      # GitHub Actions secrets exported into the SSH session, see deploy.yml; local `docker
      # compose up` reads them from the project .env). The :? guard fails the deploy with a
      # clear message if unset/empty, so the app can never boot with a blank Didit key/secret.
      # WorkflowId is NOT a secret — it lives in appsettings.json.
      Didit__ApiKey: ${DIDIT_API_KEY:?DIDIT_API_KEY is required}
      Didit__WebhookSecret: ${DIDIT_WEBHOOK_SECRET:?DIDIT_WEBHOOK_SECRET is required}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  atria-pgdata:

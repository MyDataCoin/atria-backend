name: CI + Deploy

# Build & test on every push/PR; deploy to the Ubuntu server only on pushes to the
# default branch (and manual runs). All connection details are GitHub Secrets — nothing
# sensitive lives in this file.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore Atria.sln

      - name: Build
        run: dotnet build Atria.sln -c Release --no-restore

      - name: Test
        run: dotnet test Atria.sln -c Release --no-build --verbosity normal

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-test
    # Never deploy from pull requests (incl. forks) — only direct pushes / manual runs.
    if: github.event_name != 'pull_request'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Package deployment bundle
        run: |
          tar -czf deploy.tar.gz \
            Dockerfile \
            docker-compose.yml \
            .dockerignore \
            Directory.Build.props \
            Directory.Packages.props \
            Atria.sln \
            src

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: "deploy.tar.gz"
          # Dedicated to this repo only — do NOT point this at /opt/atria. That path is also
          # the deploy target for the separate atria-admin-dashboard repo (nginx serves it from
          # /opt/atria/dashboard); the wipe step below once deleted that sibling folder.
          target: "/opt/atria-backend"
          overwrite: true

      - name: Build & restart the stack on the server
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Secrets from GitHub, transferred to the remote shell (via `envs` below) so
          # `docker compose` can interpolate ${POSTGRES_PASSWORD} and ${NIKITA_PRO_*}.
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NIKITA_PRO_LOGIN: ${{ secrets.NIKITA_PRO_LOGIN }}
          NIKITA_PRO_API_KEY: ${{ secrets.NIKITA_PRO_API_KEY }}
          DIDIT_API_KEY: ${{ secrets.DIDIT_API_KEY }}
          DIDIT_WEBHOOK_SECRET: ${{ secrets.DIDIT_WEBHOOK_SECRET }}
          # Static admin login. Only ADMIN_PASSWORD is truly secret; username/user-id are not,
          # but are forwarded the same way so all three reach `docker compose` on the server.
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          # Static realtor login. Only REALTOR_PASSWORD is truly secret; username/user-id are not,
          # but are forwarded the same way so all three reach `docker compose` on the server.
          REALTOR_USERNAME: ${{ secrets.REALTOR_USERNAME }}
          REALTOR_PASSWORD: ${{ secrets.REALTOR_PASSWORD }}
          REALTOR_USER_ID: ${{ secrets.REALTOR_USER_ID }}
          # Base URL for realtor referral links (not secret; forwarded the same way).
          REFERRAL_BASE_URL: ${{ secrets.REFERRAL_BASE_URL }}
          # SCP media host credentials (the API copies property photos/documents there).
          MEDIA_SCP_HOST: ${{ secrets.MEDIA_SCP_HOST }}
          MEDIA_SCP_USERNAME: ${{ secrets.MEDIA_SCP_USERNAME }}
          MEDIA_SCP_PASSWORD: ${{ secrets.MEDIA_SCP_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: POSTGRES_PASSWORD,NIKITA_PRO_LOGIN,NIKITA_PRO_API_KEY,DIDIT_API_KEY,DIDIT_WEBHOOK_SECRET,ADMIN_USERNAME,ADMIN_PASSWORD,ADMIN_USER_ID,REALTOR_USERNAME,REALTOR_PASSWORD,REALTOR_USER_ID,REFERRAL_BASE_URL,MEDIA_SCP_HOST,MEDIA_SCP_USERNAME,MEDIA_SCP_PASSWORD
          script: |
            set -euo pipefail

            # Install Docker (incl. the compose plugin) if this is a fresh server.
            if ! command -v docker >/dev/null 2>&1; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
            fi

            cd /opt/atria-backend
            # Remove the previously-deployed source FIRST: tar -x overlays files but never
            # prunes ones deleted in git, so stale files (e.g. removed handlers) would linger
            # in the Docker build context and break the build. Preserve .env (secrets) and the
            # incoming bundle. The Postgres data lives in a Docker volume, not here, so it is safe.
            # This directory is dedicated to the backend (see the target: comment above) so this
            # wipe can never again take out the admin dashboard's files.
            find . -maxdepth 1 -mindepth 1 ! -name '.env' ! -name 'deploy.tar.gz' -exec rm -rf {} +
            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz

            # Explicit -f excludes docker-compose.override.yml, so Postgres is NOT
            # published on the public host. The cleaned src/ changes the COPY layer content,
            # so Docker's cache invalidates the build automatically. Rebuilds + restarts.
            docker compose -f docker-compose.yml up -d --build

            # Reclaim space from old image layers.
            docker image prune -f

            docker compose -f docker-compose.yml ps
